<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivanX Vault - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #050505;
            --card-bg: #111;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navbar Style */
        .navbar {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            box-sizing: border-box;
        }

        .logo {
            color: var(--neon-cyan);
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .logout-btn {
            color: var(--neon-pink);
            text-decoration: none;
            border: 1px solid var(--neon-pink);
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        /* Main Content */
        .container {
            width: 90%;
            max-width: 800px;
            margin-top: 40px;
            text-align: center;
        }

        .welcome-card {
            border: 2px solid var(--neon-cyan);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
            background: #000;
            margin-bottom: 30px;
        }

        h1 { margin-bottom: 10px; }

        .user-highlight {
            color: var(--neon-cyan);
            text-transform: capitalize;
        }

        .status-online {
            color: #0f0;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        /* Feature Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 25px;
            border-radius: 12px;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }

        .card:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .card i {
            font-size: 2rem;
            color: var(--neon-pink);
            margin-bottom: 15px;
            display: block;
        }

        .card h3 { margin: 10px 0; }

        .card p {
            font-size: 0.85rem;
            color: #888;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">VIVANX VAULT</div>
        <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> LOGOUT</a>
    </nav>

    <div class="container">
        <div class="welcome-card">
            <h1>Welcome, <span class="user-highlight">{{ username }}</span>!</h1>
            <p style="color: #aaa;">Aapka private vault puri tarah se secure hai.</p>
            <div class="status-online">● System Online & Encrypted</div>
        </div>

        <div class="grid">
            <a href="#" class="card">
                <i class="fas fa-key"></i>
                <h3>Passwords</h3>
                <p>Manage your keys and login credentials securely.</p>
            </a>

            <a href="#" class="card">
                <i class="fas fa-file-shield"></i>
                <h3>Files</h3>
                <p>Secure cloud storage for your private documents.</p>
            </a>

            <a href="#" class="card">
                <i class="fas fa-sticky-note"></i>
                <h3>Secret Notes</h3>
                <p>Encrypted memories and personal thoughts.</p>
            </a>
        </div>
    </div>

</body>
</html>
