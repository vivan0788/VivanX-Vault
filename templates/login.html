<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Vault - Login</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #00f3ff; box-shadow: 0 0 20px #00f3ff; padding: 30px; border-radius: 15px; background: #000; width: 85%; max-width: 350px; text-align: center; }
        h2 { color: #00f3ff; text-shadow: 0 0 10px #00f3ff; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: transparent; border: 1px solid #ff00ff; color: #fff; border-radius: 5px; box-shadow: 0 0 5px #ff00ff; outline: none; }
        button { width: 100%; padding: 12px; background: #ff00ff; border: none; color: #fff; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px #ff00ff; margin-top: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>LOGIN</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">ACCESS VAULT</button>
        </form>
    </div>
</body>
</html>
