<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VivanX Vault</title>
    <style>
        :root { --c: #00f3ff; --b: #050505; }
        body { background: var(--b); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 15px; border: 1px solid var(--c); width: 85%; max-width: 350px; text-align: center; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--c); border: none; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .link { margin-top: 20px; font-size: 0.9em; color: #888; }
        .link a { color: var(--c); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:var(--c)">VIVANX LOGIN</h2>
        <form action="/login" method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button class="btn">ENTER VAULT</button>
        </form>
        <div class="link">
            New user? <a href="/register">Create Account</a>
        </div>
    </div>
</body>
</html>
