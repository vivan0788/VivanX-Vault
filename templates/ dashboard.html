<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivanX Vault - Dashboard</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navbar Style */
        .navbar {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .logo {
            color: var(--neon-cyan);
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-left: 20px;
        }

        .logout-btn {
            color: var(--neon-pink);
            text-decoration: none;
            border: 1px solid var(--neon-pink);
            padding: 8px 15px;
            border-radius: 5px;
            margin-right: 20px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        /* Main Dashboard Content */
        .container {
            width: 90%;
            max-width: 800px;
            margin-top: 40px;
            text-align: center;
        }

        .welcome-card {
            border: 2px solid var(--neon-cyan);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
            background: #000;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
        }

        .user-highlight {
            color: var(--neon-cyan);
            text-transform: capitalize;
        }

        /* Feature Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 10px;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .card i {
            font-size: 2rem;
            color: var(--neon-pink);
            display: block;
            margin-bottom: 10px;
        }

        .status-online {
            color: #0f0;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">VIVANX VAULT</div>
        <a href="/logout" class="logout-btn">LOGOUT</a>
    </nav>

    <div class="container">
        <div class="welcome-card">
            <h1>Welcome, <span class="user-highlight">{{ username }}</span>!</h1>
            <p style="color: #aaa;">Aapka private vault puri tarah se secure hai.</p>
            <div class="status-online">● System Online & Encrypted</div>
        </div>

        <div class="grid">
            <div class="card">
                <span style="font-size: 2rem;">🔒</span>
                <h3>Passwords</h3>
                <p style="font-size: 0.8rem; color: #888;">Manage your keys</p>
            </div>
            <div class="card">
                <span style="font-size: 2rem;">📂</span>
                <h3>Files</h3>
                <p style="font-size: 0.8rem; color: #888;">Secure cloud storage</p>
            </div>
            <div class="card">
                <span style="font-size: 2rem;">📝</span>
                <h3>Secret Notes</h3>
                <p style="font-size: 0.8rem; color: #888;">Encrypted memories</p>
            </div>
        </div>
    </div>

</body>
</html>
