<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - VivanX Vault</title>
    <style>
        :root { --p: #ff00ff; --b: #050505; }
        body { background: var(--b); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 15px; border: 1px solid var(--p); width: 85%; max-width: 350px; text-align: center; box-shadow: 0 0 20px rgba(255, 0, 255, 0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--p); color: #fff; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .link { margin-top: 20px; font-size: 0.9em; color: #888; }
        .link a { color: var(--p); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:var(--p)">NEW REGISTRATION</h2>
        <form action="/register" method="POST">
            <input name="username" placeholder="Choose Username" required>
            <input name="password" type="password" placeholder="Create Password" required>
            <button class="btn">CREATE ACCOUNT</button>
        </form>
        <div class="link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</body>
</html>
